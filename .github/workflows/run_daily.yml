name: Run daily script and save CSV

on:
  schedule:
    - cron: "30 12 * * *"   # 12:30 UTC = 09:30 Argentina
    - cron: "30 12 * * 0"   # Ping semanal (domingo 09:30 ARG)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bigmac-daily
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          python bigmac.py

      - name: Commit updated CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add mcdonalds_precios.csv

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update prices CSV (daily)"
          git push
